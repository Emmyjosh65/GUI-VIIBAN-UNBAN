<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GUI-VII BAN AND UNBAN</title>

<style>

body{
    margin:0;
    padding:20px;
    background:#0b1020;
    font-family:Arial, sans-serif;
    color:white;
}

.container{
    max-width:500px;
    margin:auto;
    background:#111827;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
}

h1{
    text-align:center;
    color:#00ff99;
    margin-bottom:20px;
}

input,
select,
textarea{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:#1f2937;
    color:white;
    font-size:16px;
    outline:none;
}

textarea{
    height:100px;
    resize:none;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:#00ff99;
    color:black;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

.output{
    margin-top:20px;
    background:#1f2937;
    padding:15px;
    border-radius:10px;
    white-space:pre-wrap;
    min-height:120px;
}

.footer{
    margin-top:25px;
    text-align:center;
    color:gray;
}

.whatsapp-btn{
    background:#25D366;
    color:white;
}

</style>
</head>

<body>

<div class="container">

<h1>GUI-VII BAN AND UNBAN</h1>

<input type="text" id="number" placeholder="Enter WhatsApp Number">

<select id="action">
    <option value="ban">Ban Report</option>
    <option value="unban">Unban Appeal</option>
</select>

<select id="reason">
    <option value="Spam activities">Spam</option>
    <option value="Fake account">Fake Account</option>
    <option value="Scam/Fraud">Scam/Fraud</option>
    <option value="Harassment">Harassment</option>
    <option value="Violating WhatsApp policy">Violating WhatsApp Policy</option>
</select>

<textarea id="customReason" placeholder="Write additional reason"></textarea>

<button onclick="generateMessage()">
Generate Message
</button>

<div class="output" id="output">
Your generated message will appear here...
</div>

<button onclick="copyText()">
Copy Message
</button>

<div class="footer">

<p>
Owner Contact: +58 416-9768887
</p>

<a href="https://wa.me/584169768887" target="_blank">

<button class="whatsapp-btn">
Contact Owner on WhatsApp
</button>

</a>

</div>

</div>

<script>

function generateMessage(){

    let number = document.getElementById("number").value;
    let action = document.getElementById("action").value;
    let reason = document.getElementById("reason").value;
    let customReason = document.getElementById("customReason").value;

    let message = "";

    if(action === "ban"){

        message =
`WHATSAPP REPORT

Reported Number:
${number}

Reason:
${reason}

Additional Information:
${customReason}

This account is violating WhatsApp community guidelines.
Kindly review and take necessary action.`;

    }

    else{

        message =
`WHATSAPP UNBAN APPEAL

Phone Number:
${number}

Appeal Reason:
${reason}

Additional Information:
${customReason}

I sincerely request WhatsApp to review and restore this account.
Thank you.`;

    }

    document.getElementById("output").innerText = message;
}

function copyText(){

    let text = document.getElementById("output").innerText;

    navigator.clipboard.writeText(text);

    alert("Message copied successfully!");

}

</script>

</body>
</html>
