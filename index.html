<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GUI-VII BAN AND UNBAN</title>

<style>

body{
    margin:0;
    padding:20px;
    background:linear-gradient(135deg,#001f4d,#003366,#0b1020);
    font-family:Arial, sans-serif;
    color:white;
}

.container{
    max-width:500px;
    margin:auto;
    background:rgba(10,15,35,0.95);
    padding:20px;
    border-radius:18px;
    border:2px solid gold;
    box-shadow:0 0 25px rgba(255,215,0,0.3);
}

h1{
    text-align:center;
    color:gold;
    margin-bottom:20px;
    text-shadow:0 0 10px rgba(255,215,0,0.5);
}

input,
select,
textarea{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:#0f172a;
    color:white;
    font-size:16px;
    outline:none;
    border:1px solid #1e3a8a;
}

textarea{
    height:100px;
    resize:none;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,gold,#ffcc00);
    color:black;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.02);
    opacity:0.95;
}

.output{
    margin-top:20px;
    background:#0f172a;
    padding:15px;
    border-radius:10px;
    white-space:pre-wrap;
    min-height:120px;
    border:1px solid gold;
}

.footer{
    margin-top:25px;
    text-align:center;
    color:#d1d5db;
}

.whatsapp-btn{
    background:linear-gradient(90deg,#25D366,#1ebe5d);
    color:white;
}

</style>
</head>

<body>

<div class="container">

<h1>GUI-VII BAN AND UNBAN</h1>

<input type="text" id="number" placeholder="Enter WhatsApp Number">

<select id="action">
    <option value="ban">Ban Report</option>
    <option value="unban">Unban Appeal</option>
</select>

<select id="reason">
    <option value="Spam activities">Spam</option>
    <option value="Fake account">Fake Account</option>
    <option value="Scam/Fraud">Scam/Fraud</option>
    <option value="Harassment">Harassment</option>
    <option value="Violating WhatsApp policy">Violating WhatsApp Policy</option>
</select>

<select id="device">
    <option value="Android">Android</option>
    <option value="iPhone (iOS)">iPhone (iOS)</option>
</select>

<textarea id="customReason" placeholder="Write additional reason"></textarea>

<button onclick="generateMessage()">
Generate Message
</button>

<div class="output" id="output">
Your generated message will appear here...
</div>

<button onclick="copyText()">
Copy Message
</button>

<button onclick="sendWhatsApp()" class="whatsapp-btn">
Forward to WhatsApp Support
</button>

<div class="footer">

<p>
Owner Contact: +58 416-9768887
</p>

<a href="https://wa.me/584169768887" target="_blank">

<button class="whatsapp-btn">
Contact Owner on WhatsApp
</button>

</a>

</div>

</div>

<script>

function generateMessage(){

    let number = document.getElementById("number").value;
    let action = document.getElementById("action").value;
    let reason = document.getElementById("reason").value;
    let device = document.getElementById("device").value;
    let customReason = document.getElementById("customReason").value;

    let message = "";

    if(action === "ban"){

message =
`WHATSAPP REPORT

Reported Number:
${number}

Device Type:
${device}

Reason:
${reason}

Additional Information:
${customReason}

This account is violating WhatsApp community guidelines.
Kindly review and take necessary action.`;

    }

    else{

message =
`WHATSAPP UNBAN APPEAL

Phone Number:
${number}

Device Type:
${device}

Appeal Reason:
${reason}

Additional Information:
${customReason}

I sincerely request WhatsApp to review and restore this account.
Thank you.`;

    }

document.getElementById("output").innerText = message;

}

function copyText(){

    let text = document.getElementById("output").innerText;

    navigator.clipboard.writeText(text);

    alert("Message copied successfully!");

}

function sendWhatsApp(){

    let text = document.getElementById("output").innerText;

    let url =
"https://wa.me/?text=" + encodeURIComponent(text);

    window.open(url, "_blank");

}

</script>

</body>
</html>
