<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GUI VII BAN & UNBAN</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#050010;
color:white;
overflow-x:hidden;
}

body::before{
content:'';
position:fixed;
width:500px;
height:500px;
background:#8a2be2;
filter:blur(180px);
top:-200px;
left:-100px;
opacity:0.4;
z-index:-1;
}

body::after{
content:'';
position:fixed;
width:500px;
height:500px;
background:#c26bff;
filter:blur(180px);
bottom:-200px;
right:-100px;
opacity:0.3;
z-index:-1;
}

.container{
width:100%;
max-width:450px;
margin:auto;
padding:20px;
padding-top:40px;
}

.logo{
width:100%;
border-radius:25px;
margin-bottom:25px;
border:2px solid #8a2be2;
box-shadow:0 0 25px #8a2be2;
}

.login-box,
.panel,
.form-page,
.processing-page,
.result-page{
background:#070014;
border:2px solid #8a2be2;
border-radius:30px;
padding:25px;
box-shadow:0 0 30px #8a2be2;
}

.panel,
.form-page,
.processing-page,
.result-page{
display:none;
margin-top:25px;
}

.login-box h1,
.panel h2,
.form-page h2,
.processing-page h2,
.result-page h2{
text-align:center;
color:#c26bff;
margin-bottom:25px;
}

.input-box,
select,
textarea{
width:100%;
padding:18px;
background:black;
border:2px solid #8a2be2;
border-radius:20px;
color:white;
font-size:18px;
outline:none;
margin-bottom:20px;
}

textarea{
height:120px;
resize:none;
}

.login-btn,
.action-btn{
width:100%;
padding:18px;
border:none;
border-radius:20px;
background:linear-gradient(90deg,#8a2be2,#c26bff);
color:white;
font-size:22px;
font-weight:bold;
cursor:pointer;
box-shadow:0 0 25px #8a2be2;
margin-top:15px;
}

.owner{
margin-top:30px;
text-align:center;
font-size:20px;
}

.owner-number{
margin-top:10px;
font-size:28px;
font-weight:bold;
color:#c26bff;
}

.owner-text{
margin-top:15px;
color:#bbb;
}

.buy-btn{
margin-top:25px;
}

.process{
background:#120024;
border:1px solid #8a2be2;
border-radius:15px;
padding:15px;
margin-bottom:15px;
color:#ddd;
}

.success{
color:#00ff99;
font-weight:bold;
font-size:22px;
text-align:center;
margin-top:20px;
}

label{
display:block;
margin-bottom:10px;
color:#c26bff;
font-size:18px;
}

</style>
</head>

<body>

<div class="container">

<img src="https://i.imgur.com/2dhG7vM.jpeg" class="logo">

<!-- LOGIN -->

<div class="login-box" id="loginBox">

<h1>INPUT ACCESS KEY LOGIN</h1>

<input type="text" id="accessKey" class="input-box" placeholder="Enter Access Key">

<button class="login-btn" onclick="login()">
LOGIN
</button>

<div class="owner">
Owner Contact:
</div>

<div class="owner-number">
+58 416-9768887
</div>

<div class="owner-text">
Contact owner for access key
</div>

<button class="login-btn buy-btn">
BUY ACCESS KEY
</button>

</div>

<!-- PANEL -->

<div class="panel" id="panel">

<h2>GUI VII BAN & UNBAN PANEL</h2>

<div class="process">Loading Phone Cloud...</div>
<div class="process">Connecting Secure Server...</div>
<div class="process">Decrypting Encrypted Data...</div>
<div class="process">Syncing Ban Database...</div>

<button class="action-btn" onclick="openForm('ban')">
BAN ACCOUNT
</button>

<button class="action-btn" onclick="openForm('unban')">
UNBAN ACCOUNT
</button>

</div>

<!-- FORM PAGE -->

<div class="form-page" id="formPage">

<h2 id="formTitle">BAN ACCOUNT</h2>

<label>Enter Number</label>

<input type="text" id="number" class="input-box" placeholder="+234xxxxxxxxxx">

<label id="modeText">Ban Mode</label>

<select id="mode">

<option>Temporary Ban</option>
<option>Permanent Ban</option>
<option>Spam Restriction</option>
<option>Business Ban</option>

</select>

<label>Reason</label>

<textarea id="reason" placeholder="Enter reason..."></textarea>

<button class="action-btn" onclick="startProcess()">
START PROCESS
</button>

<button class="action-btn" onclick="goBack()">
BACK
</button>

</div>

<!-- PROCESSING -->

<div class="processing-page" id="processingPage">

<h2>PROCESSING...</h2>

<div id="processArea"></div>

</div>

<!-- RESULT -->

<div class="result-page" id="resultPage">

<h2>RESULT</h2>

<div id="resultText"></div>

<button class="action-btn" onclick="resetAll()">
DONE
</button>

</div>

</div>

<script>

const validKey = "GUI-VII-9961";

let currentAction = "BAN";

function login(){

let key = document.getElementById("accessKey").value;

if(key === validKey){

alert("ACCESS GRANTED");

document.getElementById("loginBox").style.display = "none";

document.getElementById("panel").style.display = "block";

}

else{

alert("INVALID ACCESS KEY");

}

}

function openForm(type){

currentAction = type;

document.getElementById("panel").style.display = "none";

document.getElementById("formPage").style.display = "block";

if(type === "ban"){

document.getElementById("formTitle").innerHTML = "BAN ACCOUNT";

document.getElementById("modeText").innerHTML = "Ban Mode";

}

else{

document.getElementById("formTitle").innerHTML = "UNBAN ACCOUNT";

document.getElementById("modeText").innerHTML = "Unban Mode";

}

}

function goBack(){

document.getElementById("formPage").style.display = "none";

document.getElementById("panel").style.display = "block";

}

const processes = [

"Loading Phone Cloud...",
"Connecting Secure Server...",
"Decrypting Encrypted Data...",
"Checking Device Status...",
"Syncing Ban Database...",
"Verifying Account Access...",
"Bypassing Security Layers...",
"Initializing System Kernel...",
"Fetching UID Information...",
"Connecting Relay Nodes...",
"Reading Device Metadata...",
"Scanning Target Account...",
"Decrypting Cloud Packets...",
"Generating Secure Tokens...",
"Inspecting Spam Reports...",
"Loading AI Moderation...",
"Processing Account Logs...",
"Validating Cloud Signature...",
"Establishing Secure Tunnel...",
"Writing Audit Records...",
"Finalizing Moderation System...",
"Operation Completed..."

];

function startProcess(){

document.getElementById("formPage").style.display = "none";

document.getElementById("processingPage").style.display = "block";

let area = document.getElementById("processArea");

area.innerHTML = "";

let i = 0;

let interval = setInterval(() => {

if(i < processes.length){

area.innerHTML += `
<div class="process">
${processes[i]}
</div>
`;

i++;

}

else{

clearInterval(interval);

showResult();

}

},700);

}

function showResult(){

document.getElementById("processingPage").style.display = "none";

document.getElementById("resultPage").style.display = "block";

let number = document.getElementById("number").value;
let mode = document.getElementById("mode").value;
let reason = document.getElementById("reason").value;

document.getElementById("resultText").innerHTML = `

<div class="process">
Number: ${number}
</div>

<div class="process">
Mode: ${mode}
</div>

<div class="process">
Reason: ${reason}
</div>

<div class="success">
${currentAction.toUpperCase()} SUCCESSFUL
</div>

`;

}

function resetAll(){

document.getElementById("resultPage").style.display = "none";

document.getElementById("panel").style.display = "block";

document.getElementById("number").value = "";
document.getElementById("reason").value = "";

}

</script>

</body>
</html>
